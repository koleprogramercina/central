<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Central Gym</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 2rem;
        }

        .login-box {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 20px;
            border: 2px solid var(--primary-gold);
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary-gold);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-header p {
            color: var(--text-gray);
        }

        .login-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: grid;
            gap: 0.5rem;
        }

        .form-group label {
            color: var(--primary-gold);
            font-weight: 600;
        }

        .form-group input {
            background: var(--dark-bg);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            padding: 1rem;
            color: var(--text-white);
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .login-button {
            width: 100%;
            background: var(--primary-gold);
            color: var(--dark-bg);
            padding: 1rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .error-message {
            background: rgba(255, 56, 56, 0.2);
            border: 2px solid var(--red);
            color: var(--red);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--text-gray);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-link a:hover {
            color: var(--primary-gold);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>CENTRAL GYM</h1>
                <p>Admin Panel - Prijava</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Korisničko ime</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label>Lozinka</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Prijavi se
                </button>
            </form>

            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Nazad na početnu</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Korisničko ime: admin
            // Lozinka: centralgym2024
            if (username === 'admin' && password === 'centralgym2024') {
                // Sačuvaj sesiju
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('loginTime', Date.now());
                
                // Preusmeri na admin panel
                window.location.href = 'admin.html';
            } else {
                errorMessage.textContent = 'Pogrešno korisničko ime ili lozinka!';
                errorMessage.classList.add('show');
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
            
            return false;
        }
    </script>
</body>
</html>
